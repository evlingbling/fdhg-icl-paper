    inspect_task: user-place-liked
    problem_type: binary
    label_col: label
    target:
      entity_key: user_id
      time_col: timestamp
    dfs:
      child_table: beer_ratings
      child_time_col: updated_at
      numeric_col: aroma
      max_train: 10000
      max_val: 2000
    afd:
      entity_table: availability
      entity_table_key: user_id
      add_entity_alias: false
      max_rows: 50000
      columns:
      - avail_id
      - beer_id
      - place_id
      - postal_code
      - state_id
      - country_id
      - created_at
      - user_id
      - is_in_bottle
      - is_on_tap
      - is_out
      exclude_columns: []
    pairwise:
      neg_per_pos: 1
    evaluation:
      drop_cols:
      - timestamp
      - user_id
      - place_id
    fallback_to_dfs: true
  rel-ratebeer/beer-churn:
