tasks:
  rel-event/event_interest-interested:
    problem_type: binary
    label_col: interested
    target:
      primary_key_col: primary_key
      entity_key: user
      source_table: event_interest
      source_entity_col: user
      time_col: timestamp
      verify_label_col: interested
    dfs:
      child_table: event_interest
      numeric_col: user
      max_train: 14442
      max_val: 2000
    afd:
      entity_table: users
      entity_table_key: user_id
      columns:
      - locale
      - birthyear
      - gender
      - joinedAt
      - location
      - timezone
    evaluation:
      drop_cols:
      - timestamp
      - primary_key
      - user
      - f_event_interest_count
  rel-hm/transactions-price:
    problem_type: regression
    label_col: price
    target:
      primary_key_col: primary_key
      entity_key: article_id
      source_table: transactions
      source_entity_col: article_id
      time_col: t_dat
      verify_label_col: price
    dfs:
      child_table: transactions
      numeric_col: sales_channel_value
      max_train: 10000
      max_val: 2000
    evaluation:
      drop_cols:
      - t_dat
      - primary_key
      - article_id
      - f_transactions_days_since_last
    table_aliases:
      transactions:
        sales_channel_value: sales_channel_id
    afd:
      entity_table: article
      entity_table_key: article_id
      columns:
      - index_group_no
      - index_group_name
  rel-ratebeer/beer_ratings-total_score:
    problem_type: regression
    label_col: total_score
    dfs:
      child_table: beer_ratings
      numeric_col: total_score
      max_train: 10000
      max_val: 2000
    evaluation:
      drop_cols:
      - created_at
      - rating_id
      - beer_id
      - f_beer_ratings_days_since_last
    target:
      primary_key_col: rating_id
      entity_key: beer_id
      source_table: beer_ratings
      source_entity_col: beer_id
      time_col: created_at
      verify_label_col: total_score
    fallback_to_dfs: true
  rel-arxiv/paper-citation:
    builder: arxiv_paper_citation
    inspect_task: paper-citation
    problem_type: binary
    label_col: cited
    target:
      entity_key: Paper_ID
      time_col: date
    dfs:
      max_train: 10000
      max_val: 2000
    evaluation:
      drop_cols:
      - __row_id
      - date
      - Paper_ID
    fallback_to_dfs: true
  rel-arxiv/author-category:
    builder: arxiv_author_category
    inspect_task: author-category
    problem_type: multiclass
    label_col: primary_category
    target:
      entity_key: Author_ID
      time_col: date
    dfs:
      max_train: 10000
      max_val: 2000
    evaluation:
      drop_cols:
      - __row_id
      - date
      - Author_ID
  rel-ratebeer/user-place-liked_pairwise:
    builder: ratebeer_user_place_pairwise
    inspect_task: user-place-liked
    problem_type: binary
    label_col: label
    target:
      entity_key: user_id
      time_col: timestamp
    dfs:
      child_table: beer_ratings
      child_time_col: updated_at
      numeric_col: aroma
      max_train: 10000
      max_val: 2000
    afd:
      entity_table: availability
      entity_table_key: user_id
      add_entity_alias: false
      max_rows: 50000
      columns:
      - avail_id
      - beer_id
      - place_id
      - postal_code
      - state_id
      - country_id
      - created_at
      - user_id
      - is_in_bottle
      - is_on_tap
      - is_out
      exclude_columns: []
    pairwise:
      neg_per_pos: 1
    evaluation:
      drop_cols:
      - timestamp
      - user_id
      - place_id
    fallback_to_dfs: true
